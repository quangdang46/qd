# schema.example.yaml - IDE Selection Configuration
#
# Each folder can have a schema.yaml to control which IDEs receive its contents.
# This file documents all supported options.

# =============================================================================
# SUPPORTED OPTIONS
# =============================================================================

# Option 1: Whitelist - only these IDEs get this folder's contents
# supported_ides:
#   - claude-code    # Claude Code
#   - cursor         # Cursor
#   - windsurf       # Windsurf
#   - codex          # Codex
#   - antigravity    # Google Antigravity
#   - auggie         # Auggie
#   - cline          # Cline
#   - codebuddy      # CodeBuddy
#   - crush          # Crush
#   - gemini         # Gemini CLI
#   - github-copilot # GitHub Copilot
#   - iflow          # iFlow
#   - junie          # Junie
#   - kilo           # KiloCoder
#   - kiro           # Kiro
#   - ona            # Ona
#   - opencode       # OpenCode
#   - pi             # Pi
#   - qoder          # Qoder
#   - qwen           # QwenCoder
#   - roo            # Roo Code
#   - rovo-dev       # Rovo Dev
#   - trae           # Trae

# Option 2: Blacklist - all IDEs EXCEPT these get this folder's contents
# ignored_ides:
#   - codex
#   - antigravity

# Option 3: Skip this folder entirely (no IDEs get it)
# supported_ides: []

# =============================================================================
# FILE-LEVEL OVERRIDES
# =============================================================================
# Override settings for specific files within this folder

# overrides:
#   "filename.md":              # File to override
#     supported_ides: []        # Skip this file
#   "other-file.md":
#     supported_ides: [claude-code]  # Only Claude Code gets this file
#   "special.md":
#     ignored_ides: [cursor]    # All except Cursor gets this file

# =============================================================================
# EXAMPLES
# =============================================================================

# Example 1: Only Claude Code gets this folder
# supported_ides:
#   - claude-code

# Example 2: Skip folder entirely
# supported_ides: []

# Example 3: Only Claude Code and Cursor get this folder
# supported_ides:
#   - claude-code
#   - cursor

# Example 4: Everyone EXCEPT Codex gets this folder
# ignored_ides:
#   - codex

# Example 5: Skip specific files, rest goes to all
# overrides:
#   "internal-note.md":
#     supported_ides: []
