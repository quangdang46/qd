# module.example.yaml - Unified Module Configuration
#
# This file configures the QD module with IDE selection and format conversion.

# =============================================================================
# MODULE INFO (Optional)
# =============================================================================

code: qd                           # Module identifier
name: "QD Framework"               # Display name
description: "Quick Development Framework - AI-driven development methodology"

# =============================================================================
# IDE SELECTION RULES
# =============================================================================
#
# Control which IDEs receive artifacts. Can be set at root level (applies to all)
# or per-file using overrides.
#
# Option 1: Whitelist - only these IDEs get ALL artifacts
# supported_ides:
#   - claude-code    # Claude Code
#   - cursor         # Cursor
#   - windsurf       # Windsurf
#   - codex          # Codex
#   - antigravity    # Google Antigravity
#   - auggie         # Auggie
#   - cline          # Cline
#   - codebuddy      # CodeBuddy
#   - crush          # Crush
#   - gemini         # Gemini CLI
#   - github-copilot # GitHub Copilot
#   - iflow          # iFlow
#   - junie          # Junie
#   - kilo           # KiloCoder
#   - kiro           # Kiro
#   - ona            # Ona
#   - opencode       # OpenCode
#   - pi             # Pi
#   - qoder          # Qoder
#   - qwen           # QwenCoder
#   - roo            # Roo Code
#   - rovo-dev       # Rovo Dev
#   - trae           # Trae

# Option 2: Blacklist - all IDEs EXCEPT these get ALL artifacts
# ignored_ides:
#   - codex
#   - antigravity

# =============================================================================
# FILE-LEVEL OVERRIDES
# =============================================================================
# Override settings for specific files (overrides root-level rules)

# overrides:
#   "testfile.md":                  # File to override
#     supported_ides: [claude-code]  # Only Claude Code gets this file
#   "internal-note.md":
#     supported_ides: []          # Skip this file (no IDEs get it)
#   "special.md":
#     ignored_ides: [cursor]       # All except Cursor gets this file

# =============================================================================
# FORMAT CONVERSION RULES
# =============================================================================
#
# Convert artifact files from MD to other formats for specific IDEs.
# By default, files are copied as-is (no conversion needed).
#
# Key: IDE platform code (e.g., codex, claude-code)
# Value: Object with glob pattern → target format mappings
#
# Glob patterns are relative to artifacts/ root

convert:
  # Codex requires TOML format for agents
  codex:
    # Pattern syntax: "path/**/*.md" or "path/**"
    "agents/**": toml         # Convert agents/*.md → agents/*.toml
    "subagents/**": toml      # Convert subagents/*.md → subagents/*.toml

  # Claude Code uses native skills format (no conversion needed - just copy)
  # claude-code:
  #   "output-styles/**": md   # Example if needed

  # Add more IDE conversions as needed:
  # other-ide:
  #   "skills/**": json        # Convert to JSON format

# =============================================================================
# CONVERSION BEHAVIOR
# =============================================================================
#
# - Files matching convert rules are CONVERTED, not copied
# - Files not matching any convert rule are COPIED as-is
# - Conversion is applied AFTER schema filtering (only for allowed IDEs)
#
# Current supported formats:
#   - toml: Markdown → TOML (for Codex subagents)
#     * Extracts frontmatter (name, description)
#     * Wraps content in [developer_instructions] section

# =============================================================================
# EXAMPLE CONFIGURATIONS
# =============================================================================

# Minimal config (no IDE selection, no conversion):
# code: my-module
# name: "My Module"
#
# convert: {}  # Empty = copy as-is

# Only Claude Code and Cursor get all artifacts:
# supported_ides:
#   - claude-code
#   - cursor
#
# convert:
#   codex:
#     "agents/**": toml

# Everyone except Codex gets all artifacts:
# ignored_ides:
#   - codex
#
# convert: {}
