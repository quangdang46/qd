# QD Platform Codes Configuration
#
# Each platform entry has:
#   name: Display name shown to users
#   preferred: Whether shown as a recommended option on install
#   suspended: (optional) Message explaining why install is blocked
#   installer:
#     target_dir: Top-level IDE directory (e.g., .claude, .cursor)
#     mappings: Artifact type → subdirectory mapping
#       (controls how artifacts/skills, artifacts/commands, etc. map to IDE subdirs)
#
# Mapping rules:
# - mappings.<type>: <target> — maps artifacts/<type>/ to <target>/ in IDE dir
# - Default target = type name if not specified

platforms:
  claude-code:
    name: "Claude Code"
    preferred: true
    installer:
      legacy_targets:
        - .claude/commands
      target_dir: .claude

  cursor:
    name: "Cursor"
    preferred: true
    installer:
      legacy_targets:
        - .cursor/commands
      target_dir: .cursor

  windsurf:
    name: "Windsurf"
    preferred: false
    installer:
      target_dir: .windsurf

  codex:
    name: "Codex"
    preferred: false
    installer:
      legacy_targets:
        - .codex/prompts
        - ~/.codex/prompts
      target_dir: .codex

